<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Prática - Web</title>
    <style>
        /* Mudança de cores e estilo visual */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { margin: 0; background-color: #e9ecef; color: #333; }

        /* Header com gradiente e novo layout */
        .main-header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            padding: 20px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-links a {
            color: #adcaeb;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .nav-links a:hover { color: #fff; }

        /* Grid em vez de Flexbox simples para os cards */
        .content-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 50px 5%;
        }

        .info-card {
            background: #fff;
            border-top: 5px solid #2a5298;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s;
        }

        .info-card:hover { transform: translateY(-5px); }

        /* Botões estilizados */
        .btn-action {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-action:hover { background-color: #218838; }

        /* Seção de Interação */
        .interaction-area {
            background: #fff;
            max-width: 600px;
            margin: 0 auto 40px;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .input-field {
            padding: 12px;
            width: 60%;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .input-field:focus { border-color: #2a5298; }

        #resultArea {
            margin-top: 20px;
            height: 25px;
            font-style: italic;
            color: #555;
        }

        .main-footer {
            background: #222;
            color: #aaa;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header class="main-header">
    <h1>Dev Prova</h1>
    <nav class="nav-links">
        <a href="#home">Início</a>
        <a href="#sobre">Info</a>
        <a href="#contato">Suporte</a>
    </nav>
</header>

<main class="content-wrapper">
    <section class="info-card">
        <h3>Módulo A</h3>
        <p>Primeira descrição técnica.</p>
        <button class="btn-action" onclick="notificar(1)">Ativar</button>
    </section>

    <section class="info-card">
        <h3>Módulo B</h3>
        <p>Segunda descrição técnica.</p>
        <button class="btn-action" onclick="notificar(2)">Ativar</button>
    </section>

    <section class="info-card">
        <h3>Módulo C</h3>
        <p>Terceira descrição técnica.</p>
        <button class="btn-action" onclick="notificar(3)">Ativar</button>
    </section>
</main>

<section class="interaction-area">
    <input type="text" id="userInput" class="input-field" placeholder="Escreva seu nome aqui...">
    <button class="btn-action" style="background-color: #2a5298;" onclick="processarSaudacao()">Confirmar</button>
    <div id="resultArea"></div>
</section>

<footer class="main-footer">
    Desenvolvido por: <strong>Felipe Paiaro</strong> | &copy; 2024 Prova Front-end
</footer>

<script>
    // Funções renomeadas e lógica levemente alterada
    function notificar(id) {
        alert("Aviso: O card selecionado foi o " + id);
    }

    function processarSaudacao() {
        const campoTexto = document.getElementById("userInput");
        const areaMensagem = document.getElementById("resultArea");
        const valorInput = campoTexto.value.trim();

        if (valorInput.length > 0) {
            areaMensagem.textContent = `Bem-vindo, ${valorInput}!`;
            areaMensagem.style.color = "#28a745";
        } else {
            areaMensagem.textContent = "Erro: O campo não pode estar vazio.";
            areaMensagem.style.color = "#dc3545";
        }
    }
</script>

</body>
</html>
